<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interní Test Rezervací — Motivus</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  
  <style>
    .sandbox-container {
      max-width: 800px;
      margin: 100px auto;
      padding: 40px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      text-align: center;
    }
    .sandbox-container h1 {
      font-family: var(--font-heading);
      font-size: var(--size-h2);
      color: var(--color-accent);
      margin-bottom: 20px;
    }
    .sandbox-container p {
      margin-bottom: 40px;
      color: var(--color-text-muted);
    }
    /* Cal.com Wrapper */
    #my-cal-inline {
      min-height: 700px;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: var(--color-bg);
    }
  </style>
</head>
<body>

  <div class="sandbox-container">
    <span class="label">Písek (Sandbox)</span>
    <h1>Testování Rezervačního Systému</h1>
    <p>Tato stránka je veřejnosti skrytá. Slouží výhradně pro zakladatele k otestování celého procesu (v češtině), dříve než se nasadí na hlavní web `motivus.cz`.</p>
    
    <!-- Zde přijde kód od Cal.com -->
    <!-- Cal inline embed code begins -->
    <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline"></div>
    <script type="text/javascript">
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; typeof namespace === "string" ? (cal.ns[namespace] = api) && p(api, ar) : p(cal, ar); return; } p(cal, ar); }; })(window, "https://app.cal.eu/embed/embed.js", "init");
    Cal("init", {origin:"https://cal.eu"});

    // Skutečný odkaz na Týmový profil Motivus a službu Transformační koučink
    Cal("inline", {
      elementOrSelector:"#my-cal-inline",
      calLink: "team/motivus/transformacni-koucink",
      layout: "month_view"
    });

    Cal("ui", {
      "styles": {
        "branding": {
          "brandColor": "#8B7355" // Motivus Accent Color
        }
      },
      "hideEventTypeDetails": false,
      "layout": "month_view"
    });
    </script>
    <!-- Cal inline embed code ends -->
  </div>

</body>
</html>
